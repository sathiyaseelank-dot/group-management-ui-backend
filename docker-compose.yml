services:
  postgres:
    image: postgres:16-alpine
    container_name: gm-postgres
    environment:
      POSTGRES_DB: gmdb
      POSTGRES_USER: gmuser
      POSTGRES_PASSWORD: gmpass
    ports:
      - "5432:5432"
    volumes:
      - gm-postgres-data:/var/lib/postgresql/data

  controller:
    image: golang:1.25-bookworm
    container_name: gm-controller
    working_dir: /workspace/backend/controller
    command: ["go", "run", "."]
    environment:
      TRUST_DOMAIN: ${TRUST_DOMAIN:-mycorp.internal}
      CONTROLLER_ADDR: ${CONTROLLER_ADDR:-127.0.0.1:8443}
      ADMIN_HTTP_ADDR: ${ADMIN_HTTP_ADDR:-:8081}
      ADMIN_AUTH_TOKEN: ${ADMIN_AUTH_TOKEN:-7f8e91a2b3c4d5e6f7a8b9c0d1e2f3a4}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-e4b2f8d1c3a9e6f7b0d2a4c9e8f1a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3}
      POLICY_SIGNING_KEY: ${POLICY_SIGNING_KEY:-e4b2f8d1c3a9e6f7b0d2a4c9e8f1a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3}
      DATABASE_URL: ${DATABASE_URL:-postgres://gmuser:gmpass@postgres:5432/gmdb?sslmode=disable}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      USER_OAUTH_REDIRECT_URL: ${USER_OAUTH_REDIRECT_URL:-http://localhost:8081/oauth/google/callback}
      ADMIN_OAUTH_REDIRECT_URL: ${ADMIN_OAUTH_REDIRECT_URL:-http://localhost:8080/oauth/google/callback}
      OAUTH_CALLBACK_ADDR: ${OAUTH_CALLBACK_ADDR:-:8080}
      INVITE_BASE_URL: ${INVITE_BASE_URL:-http://localhost:3000}
      DASHBOARD_URL: ${DASHBOARD_URL:-http://localhost:3000}
      ADMIN_LOGIN_EMAILS: ${ADMIN_LOGIN_EMAILS:-gyogesh1906@gmail.com}
      JWT_SECRET: ${JWT_SECRET:-}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-gyogesh1906@gmail.com}
      SMTP_PASS: ${SMTP_PASS:-somthcczqumharms}
      SMTP_FROM: ${SMTP_FROM:-ZTNA gyogesh1906@gmail.com}
    volumes:
      - ./backend:/workspace/backend
    depends_on:
      - postgres
    ports:
      - "8080:8080"
      - "8081:8081"
      - "8443:8443"

  frontend:
    image: node:20-bookworm
    container_name: gm-frontend
    working_dir: /workspace/frontend
    command: ["sh", "-lc", "npm install && npm run dev"]
    environment:
      BACKEND_URL: http://controller:8081
      BACKEND_PUBLIC_URL: ${BACKEND_PUBLIC_URL:-http://localhost:8081}
      ADMIN_AUTH_TOKEN: ${ADMIN_AUTH_TOKEN:-7f8e91a2b3c4d5e6f7a8b9c0d1e2f3a4}
      PORT: 3001
      VITE_INVITE_BASE_URL: ${VITE_INVITE_BASE_URL:-http://localhost:8081}
    volumes:
      - ./frontend:/workspace/frontend
    depends_on:
      - controller
    ports:
      - "3000:3000"
      - "3001:3001"

volumes:
  gm-postgres-data:
